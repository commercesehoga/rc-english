<script>
document.getElementById('streak-badge').textContent = WM.currentStreak() > 0 ? `\u{1F525} ${WM.currentStreak()} day streak` : '';

const app = document.getElementById('app-area');

// Builds the last N Monday week-start dates (IST), most recent first, for the week picker.
function recentWeekStarts(n) {
  const out = [];
  let d = WM.weekBounds(WM.todayIST()).start;
  for (let i = 0; i < n; i++) {
    out.push(d);
    const prev = new Date(d + 'T00:00:00Z');
    prev.setUTCDate(prev.getUTCDate() - 7);
    d = prev.toISOString().slice(0, 10);
  }
  return out;
}

async function loadLeaderboard(weekStart) {
  app.innerHTML = '<div class="loading-state">Loading leaderboard…</div>';
  try {
    const res = await fetch('/api/leaderboard/' + weekStart);
    const data = await res.json();
    render(weekStart, data);
  } catch (err) {
    app.innerHTML = `<div class="empty-state">Could not load the leaderboard. ${err.message}</div>`;
  }
}

function render(weekStart, data) {
  const weeks = recentWeekStarts(6);
  const picker = `
    <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px;">
      ${weeks.map(w => `
        <button type="button" class="archive-topic-pill ${w === weekStart ? 'active' : ''}" data-week="${w}">
          Week of ${w}
        </button>
      `).join('')}
    </div>
  `;

  if (!data.configured) {
    app.innerHTML = picker + `<div class="empty-state">The leaderboard isn't configured yet — check back soon!</div>`;
    wireWeekButtons();
    return;
  }

  if (!data.scores || !data.scores.length) {
    app.innerHTML = picker + `
      <div class="leaderboard-card">
        <h3>🏆 Week of ${weekStart}</h3>
        <p style="color:var(--text-muted); font-size:13.5px;">No scores yet for this week. Take the <a href="weekly-test.html">Weekly Test</a> and opt in to be the first!</p>
      </div>
    `;
    wireWeekButtons();
    return;
  }

  app.innerHTML = picker + `
    <div class="leaderboard-card">
      <h3>🏆 Week of ${weekStart}</h3>
      ${data.scores.map((s, i) => `
        <div class="leaderboard-row">
          <span class="leaderboard-rank">#${i + 1}</span>
          <span class="leaderboard-name">${s.first_name}</span>
          <span class="leaderboard-pct">${s.pct}%</span>
        </div>
      `).join('')}
    </div>
    <p class="sync-note">Scores are opt-in — take the <a href="weekly-test.html">Weekly Test</a> and check the leaderboard box on your result screen to appear here.</p>
  `;
  wireWeekButtons();
}

function wireWeekButtons() {
  document.querySelectorAll('.archive-topic-pill').forEach(btn => {
    btn.addEventListener('click', () => loadLeaderboard(btn.dataset.week));
  });
}

loadLeaderboard(WM.weekBounds(WM.todayIST()).start);
</script>
