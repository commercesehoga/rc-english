<script src="nav.js"></script>

<script>
document.getElementById('streak-badge').textContent = WM.currentStreak() > 0 ? `\u{1F525} ${WM.currentStreak()} day streak` : '';

const app = document.getElementById('app-area');

// ---------- Retry-mode quiz state ----------
let retryQueue = [];
let retryIdx = 0;
let retrySession = { retried: 0, correct: 0, mastered: 0 };

function optionCard(m, idx, total) {
  return `
    <div class="q-card" data-id="${m.id}">
      <div class="q-meta">
        <span class="q-chip">${m.category}</span>
        ${m.topic ? `<span class="q-chip">${m.topic}</span>` : ''}
        <span class="q-chip">Q${idx + 1} of ${total}</span>
      </div>
      <div class="q-text">${m.question}</div>
      <div class="option-row">
        ${['a','b','c','d'].map(l => `
          <button class="option" data-letter="${l}" data-correct="${m.correct}">
            <span class="letter">${l.toUpperCase()}</span> ${m.options[l]}
          </button>
        `).join('')}
      </div>
      <div class="explanation">${m.explanation || ''}</div>
    </div>
  `;
}

function renderRetryQuestion() {
  if (retryIdx >= retryQueue.length) { renderRetrySummary(); return; }
  const m = retryQueue[retryIdx];
  app.innerHTML = `
    <div class="retry-progress">Retrying mistake ${retryIdx + 1} of ${retryQueue.length}</div>
    ${optionCard(m, retryIdx, retryQueue.length)}
  `;
  const card = app.querySelector('.q-card');
  const options = card.querySelectorAll('.option');
  options.forEach(opt => {
    opt.addEventListener('click', () => {
      if (card.dataset.answered) return;
      card.dataset.answered = '1';
      const correct = opt.dataset.correct;
      const letter = opt.dataset.letter;
      options.forEach(o => {
        if (o.dataset.letter === correct) o.classList.add('correct');
        else if (o === opt) o.classList.add('wrong');
      });
      card.querySelector('.explanation').classList.add('show');

      const wasCorrect = letter === correct;
      const outcome = WM.recordMistakeRetry(m.id, wasCorrect);
      retrySession.retried++;
      if (wasCorrect) retrySession.correct++;
      if (outcome && outcome.mastered) retrySession.mastered++;

      setTimeout(() => { retryIdx++; renderRetryQuestion(); }, 900);
    });
  });
}

function renderRetrySummary() {
  document.getElementById('streak-badge').textContent = WM.currentStreak() > 0 ? `\u{1F525} ${WM.currentStreak()} day streak` : '';
  app.innerHTML = `
    <div class="retry-result-banner">
      <div style="font-size:13px; color:var(--text-muted); font-weight:600;">RETRY SESSION COMPLETE</div>
      <div class="num">${retrySession.correct} / ${retrySession.retried}</div>
      <div style="color:var(--text-muted);">correct on this retry${retrySession.mastered ? ` · ${retrySession.mastered} mastered and retired` : ''}</div>
    </div>
    <div style="text-align:center; margin-bottom:24px;">
      <button id="back-to-list-btn" class="btn btn-primary">Back to Mistakes</button>
    </div>
  `;
  document.getElementById('back-to-list-btn').addEventListener('click', renderList);
}

function startRetry() {
  retryQueue = WM.getDueMistakes();
  if (!retryQueue.length) return;
  retryIdx = 0;
  retrySession = { retried: 0, correct: 0, mastered: 0 };
  renderRetryQuestion();
}

// ---------- List view ----------

function mistakeRow(m, dueNow) {
  return `
    <div class="q-card">
      <div class="q-meta">
        <span class="q-chip">${m.category}</span>
        ${m.topic ? `<span class="q-chip">${m.topic}</span>` : ''}
        <span class="q-chip">${m.date}</span>
        <span class="q-chip">${dueNow ? 'Due for review' : `Next review: ${m.dueDate}`}</span>
      </div>
      <div class="q-text">${m.question}</div>
      <div class="option-row">
        ${['a','b','c','d'].map(l => {
          let cls = 'option';
          if (l === m.correct) cls += ' correct';
          else if (l === m.chosen) cls += ' wrong';
          return `<div class="${cls}"><span class="letter">${l.toUpperCase()}</span> ${m.options[l]}</div>`;
        }).join('')}
      </div>
      <div class="explanation show">${m.explanation || ''}</div>
      <button class="btn-ghost dismiss-btn" data-id="${m.id}" style="margin-top:12px; border-radius:8px;">Dismiss</button>
    </div>
  `;
}

function renderList() {
  const all = WM.getMistakes();
  const due = WM.getDueMistakes();
  const upcoming = all.length - due.length;

  if (!all.length) {
    app.innerHTML = `<div class="empty-state">No mistakes saved yet. Wrong answers from Practice, Retry Mode, or your custom sets will show up here so you can revisit them.</div>`;
    return;
  }

  app.innerHTML = `
    <div class="mistakes-toolbar">
      <span class="mistakes-summary"><strong>${all.length}</strong> saved · <strong>${due.length}</strong> due now${upcoming ? ` · ${upcoming} resurfacing later` : ''}</span>
      <div style="display:flex; gap:10px;">
        <button id="retry-btn" class="btn btn-primary" ${due.length ? '' : 'disabled'}>Retry These (${due.length}) <span class="icon-circle">→</span></button>
        <button id="clear-all-btn" class="btn btn-secondary">Clear All</button>
      </div>
    </div>
    <div id="mistake-list"></div>
  `;

  const listEl = document.getElementById('mistake-list');
  listEl.innerHTML = all
    .slice()
    .sort((a, b) => (a.dueDate || '').localeCompare(b.dueDate || ''))
    .map(m => mistakeRow(m, due.some(d => d.id === m.id)))
    .join('');

  document.getElementById('retry-btn').addEventListener('click', startRetry);
  document.getElementById('clear-all-btn').addEventListener('click', () => {
    if (confirm('Clear all saved mistakes?')) { WM.clearAllMistakes(); renderList(); }
  });
  listEl.querySelectorAll('.dismiss-btn').forEach(btn => {
    btn.addEventListener('click', () => { WM.clearMistake(parseInt(btn.dataset.id, 10)); renderList(); });
  });
}

// Pull any server-synced mistakes (from another device) before first render, if signed in.
(async function init() {
  if (WM.getTelegramUser()) { try { await WM.pullProgress(); } catch {} }
  renderList();
})();
</script>
